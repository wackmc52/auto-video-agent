# Auto Video Agent — Default Configuration

video:
  width: 1080
  height: 1920
  fps: 30
  codec: libx264
  audio_codec: aac
  format: mp4

branding:
  logo_path: assets/logo/logo.png
  logo_position: top-right    # top-left | top-right | bottom-left | bottom-right
  logo_size: 120              # pixels (width, maintains aspect ratio)
  primary_color: "#FFD700"    # gold
  secondary_color: "#1A1A1A"  # near black
  accent_color: "#FFFFFF"     # white

captions:
  font_path: assets/fonts/Montserrat-Bold.ttf
  font_size: 60
  font_color: "#FFFFFF"
  stroke_color: "#000000"
  stroke_width: 3
  position: center            # center | bottom
  words_per_frame: 3
  style: highlight            # highlight | pop | slide

voiceover:
  provider: edge-tts          # edge-tts | elevenlabs | openai
  edge_voice: en-US-GuyNeural # Microsoft Edge TTS voice
  speed: 1.0

music:
  volume: 0.15                # relative to voice (0.0 - 1.0)
  fade_in: 1.0                # seconds
  fade_out: 2.0               # seconds
  default_track: upbeat

output:
  directory: output
  max_file_size_mb: 50
